spring.application.name=authservice
server.port=8081
eureka.client.service-url.defaultZone=http://discoveryserver:8761/eureka/
spring.datasource.url=jdbc:postgresql://postgres-auth:5432/authdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
jwt.secret=gameplatform-super-secret-key-must-be-at-least-256-bits-long
jwt.expiration=86400000