spring.application.name=api-gateway
server.port=8080
eureka.client.service-url.defaultZone=http://discoveryserver:8761/eureka/
spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://AUTHSERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.server.webmvc.routes[1].id=user-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://USERSERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/users/**
spring.cloud.gateway.server.webmvc.routes[2].id=tictactoe-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://TICTACTOESERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/tictactoe/**
spring.cloud.gateway.server.webmvc.routes[3].id=coinflip-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://COINFLIPSERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/coinflip/**
jwt.secret=gameplatform-super-secret-key-must-be-at-least-256-bits-long
jwt.expiration=86400000
management.endpoints.web.exposure.include=*
spring.jpa.open-in-view=false