services:

  postgres-auth:
    image: postgres:16
    container_name: postgres-auth
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "5440:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - gameplatform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d authdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres-user:
    image: postgres:16
    container_name: postgres-user
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "5441:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    networks:
      - gameplatform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres-tictactoe:
    image: postgres:16
    container_name: postgres-tictactoe
    environment:
      POSTGRES_DB: tictactoedb
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "5442:5432"
    volumes:
      - postgres_tictactoe_data:/var/lib/postgresql/data
    networks:
      - gameplatform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d tictactoedb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres-coinflip:
    image: postgres:16
    container_name: postgres-coinflip
    environment:
      POSTGRES_DB: coinflipdb
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "5443:5432"
    volumes:
      - postgres_coinflip_data:/var/lib/postgresql/data
    networks:
      - gameplatform-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d coinflipdb" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set}
    networks:
      - gameplatform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Spring Boot Services ─────────────────────────────────────────────────────

  discoveryserver:
    build: ./discoveryserver
    container_name: discoveryserver
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - gameplatform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  apigateway:
    build: ./apigateway
    container_name: apigateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      discoveryserver:
        condition: service_healthy
    networks:
      - gameplatform-network
    restart: unless-stopped

  authservice:
    build: ./authservice
    container_name: authservice
    # No host port — only accessible via the API gateway internally
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      discoveryserver:
        condition: service_healthy
      postgres-auth:
        condition: service_healthy
    networks:
      - gameplatform-network
    restart: unless-stopped

  userservice:
    build: ./userservice
    container_name: userservice
    # No host port — only accessible via the API gateway internally
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      discoveryserver:
        condition: service_healthy
      postgres-user:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gameplatform-network
    restart: unless-stopped

  tictactoeservice:
    build: ./tictactoeservice
    container_name: tictactoeservice
    # No host port — only accessible via the API gateway internally
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      discoveryserver:
        condition: service_healthy
      postgres-tictactoe:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gameplatform-network
    restart: unless-stopped

  coinflipservice:
    build: ./coinflipservice
    container_name: coinflipservice
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      discoveryserver:
        condition: service_healthy
      postgres-coinflip:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gameplatform-network
    restart: unless-stopped

volumes:
  postgres_auth_data:
  postgres_user_data:
  postgres_tictactoe_data:
  postgres_coinflip_data:

networks:
  gameplatform-network:
    driver: bridge